<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>기업 실적 대시보드 | Financial Dashboard</title>
    
    <!-- CSS -->
    <link rel="stylesheet" href="styles.css">
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Dependencies -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.2.0"></script>
</head>
<body>
    <div class="dashboard-header">
        <h1>기업 실적 분석 - [Excel 데이터 시트]</h1>
        <div class="status-indicators">Ready</div>
    </div>

    <!-- Excel Ribbon UI -->
    <div class="excel-ribbon">
        <div class="ribbon-tabs">
            <span class="ribbon-tab active">데이터</span>
            <span class="ribbon-tab">분석</span>
            <span class="ribbon-tab">보기</span>
        </div>
        <div class="ribbon-controls">
            <div class="control-group">
                <label for="company-select">대상 기업:</label>
                <select id="company-select">
                    <!-- Options populated dynamically -->
                </select>
            </div>
            <div class="control-group view-toggle">
                <button id="btn-chart-view" class="view-btn active">개별 시트</button>
                <button id="btn-table-view" class="view-btn">전체 데이터 표</button>
            </div>
        </div>
    </div>

    <!-- Formula Bar -->
    <div class="formula-bar">
        <div class="name-box" id="active-cell-label">A1</div>
        <div class="formula-input">
            <span class="fx-icon">fx</span>
            <span id="formula-display">=SUM(B2:B5)</span>
        </div>
    </div>

    <div class="dashboard-container">
        <!-- Charts and Metrics -->
        <section class="chart-section" id="chart-section">
            <div class="summary-grid" id="summary-cards">
                <div class="summary-item">
                    <label id="label-revenue">매출액</label>
                    <div class="value" id="summary-revenue">0원</div>
                    <div class="yoy" id="yoy-revenue"></div>
                </div>
                <div class="summary-item">
                    <label id="label-profit">영업이익</label>
                    <div class="value" id="summary-profit">0원</div>
                    <div class="yoy" id="yoy-profit"></div>
                </div>
                <div class="summary-item">
                    <label>영업이익률</label>
                    <div class="value" id="summary-margin">-</div>
                </div>
            </div>

            <div class="chart-cell-container">
                <canvas id="financialChart"></canvas>
            </div>
        </section>

        <!-- Table View -->
        <section class="table-section glass-panel" id="table-section" style="display: none;">
            <div class="table-responsive">
                <table id="financial-table">
                    <thead>
                        <!-- Dynamically filled -->
                    </thead>
                    <tbody>
                        <!-- Dynamically filled -->
                    </tbody>
                </table>
            </div>
        </section>
        
        <!-- Toast Notification -->
        <div id="toast" class="toast">데이터를 성공적으로 불러왔습니다.</div>
    </div>

    <!-- Excel Status Bar -->
    <div class="excel-status-bar">
        <span>Ready</span>
        <span>Average: 45,200</span>
        <span>Count: 12</span>
        <span>Sum: 542,400</span>
        <span style="margin-left: auto;">100%</span>
    </div>
    
    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
